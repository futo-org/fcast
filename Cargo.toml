[workspace]
members = [
    "xtask",
    "sdk/sender/fcast-sender-sdk",
    "sdk/sender/examples/terminal",
    "senders/terminal",
    "sdk/sender/examples/desktop",
    "sdk/common/fcast-protocol",
    "sdk/mirroring_core",
    "senders/desktop",
    "senders/android",
    "tools/fast",
    "sdk/file-server",
    "senders/android",
    "receivers/experimental/rcore",
    "receivers/experimental/desktop",
    "receivers/experimental/android",
    "tools/remote-pipeline-dbg",
    "crates/app-updater",
    "sdk/common/google-cast-protocol", "crates/receiver-resources",
]
resolver = "2"

[workspace.package]
license = "MIT"

[workspace.dependencies]
tokio = { version = "1.51", features = [ "full" ] }
serde = { version = "1.0", features = [ "derive" ] }
gst = { package = "gstreamer", version = "0.25" }
gst-app = { package = "gstreamer-app", version = "0.25", features = [ "v1_24" ] }
gst-video = { package = "gstreamer-video", version = "0.25", features = [ "v1_24" ] }
gst-base = { package = "gstreamer-base", version = "0.25", features = [ "v1_24" ] }
gst-plugin-rtp = { version = "0.15", features = [ "static" ] }
serde_json = "1.0"
thiserror = "2.0"
log = "0.4"
env_logger = "0.11.8"
mdns-sd = "0.18"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-gstreamer = "0.9"
tracing-panic = "0.1.2"
parking_lot = "0.12"
slint = { version = "1.15.1", default-features = false }
slint-build = "1.15.1"
clap = { version = "4.5", features = ["derive"] }
uuid = { version = "1.18.1", features = [ "v4" ] }
bytes = "1"
smallvec = { version = "1.15.1", features = ["serde"] }
smol_str = { version = "0.3.4", features = ["serde"] }
toml_edit = { version = "0.24", features = ["serde"] }
futures = "0.3"
lazy_static = "1.5"
rand = "0.10"
num_cpus = "1"
image_swizzle = "0.3.0"
mimalloc = { version = "0.1", features = ["v3"] }
ctrlc = "3"
hyper = "1.7.0"
hyper-util = "0.1.17"

[profile.release]
lto = "fat"
codegen-units = 1
strip = "debuginfo"

[profile.release-dbg]
inherits = "release"
debug = "full"
strip = false
