[package]
name = "desktop-mirroring"
description = "Screen mirroring for FCast"
version = "0.1.0"
edition = "2024"
license.workspace = true
publish = false

[dependencies]
fcast-protocol = { path = "../../../sdk/common/fcast-protocol" }
slint.workspace = true
anyhow.workspace = true
mdns-sd = "0.13.9"
flume = "0.11.1"
tokio.workspace = true
gst.workspace = true
fcast-sender-sdk = { path = "../../../sdk/sender/fcast-sender-sdk", default-features = false, features = [ "fcast", "discovery" ] }
mcore.path = "../mcore"
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-gstreamer = "0.9.0"
tracing-log = "0.2.0"
clap.workspace = true

[build-dependencies]
slint-build.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
ashpd = { version = "0.11.0", default-features = false, features = ["async-std"] } # `tokio` breaks slint
xcb = { version = "1.6.0", features = ["randr", "xlib_xcb"] }
x11 = "2.21.0"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-core-graphics = "0.3.2"
core-foundation = "0.10.1"