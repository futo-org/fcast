buildReceiverFhsLinuxX64RPM:
  stage: receiverExperimental
  tags:
    - fcast-autoscaler
  script:
    - dnf install -y libheif-devel libdrm-devel zig
    - git config --global url."https://oauth2:${FHS_GH_PAT}@github.com/".insteadOf "git@github.com:"
    - rm -rf /tmp/fiatlux-client
    - git clone --recursive https://oauth2:${FHS_GH_PAT}@github.com/futo-org/fhs-fiatlux-client.git /tmp/fiatlux-client
    - pushd /tmp/fiatlux-client && zig build install -Ddistribute=true -p /usr/local && popd
    - rustup install nightly-2026-01-15
    - rustup default nightly-2026-01-15
    - cargo install cargo-generate-rpm
    - cargo build --release --package fhs-receiver
    - cargo generate-rpm -p receivers/experimental/fhs
    - cp target/generate-rpm/*.rpm .
    - RPM_FILE=$(ls *.rpm | head -1)
    - VERSION=$(grep '^version' receivers/experimental/fhs/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
    - ENDPOINT="--endpoint-url $FHS_R2_ENDPOINT"
    - BUCKET="s3://$FHS_R2_BUCKET"
    - ARCH=$(rpm -qp --queryformat '%{ARCH}' "$RPM_FILE")
    - aws s3 cp "$RPM_FILE" "${BUCKET}/${RPM_FILE}" $ENDPOINT
    - aws s3 cp "$RPM_FILE" "${BUCKET}/fcast-receiver-latest.${ARCH}.rpm" $ENDPOINT
  artifacts:
    untracked: false
    when: on_success
    access: all
    paths:
      - ./*.rpm
  when: manual
