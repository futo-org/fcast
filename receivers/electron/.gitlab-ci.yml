
buildMac:
  stage: buildAndDeployElectron
  tags:
    - m1-macos
  before_script:
    - cd receivers/electron
  script:
    - npm install
    - npm run build
    - npm run make -- --platform="darwin" --arch="arm64"
    - npm run make -- --platform="darwin" --arch="x64"
  when: manual

buildWindowsAndLinux:
  image: node:latest
  stage: buildAndDeployElectron
  tags:
    - fcast
  before_script:
    - cd receivers/electron
    - apt update && apt install -y zip dpkg fakeroot rpm wine wget unzip
    - wget https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip
    - unzip wix314-binaries.zip -d wix314-binaries
    # p7zip-full
    - export WINEPATH="wix314-binaries/"
  script:
    - npm install
    - npm run build
    - npm run make -- --platform="win32" --arch="x64"
    # - npm run make -- --platform="linux" --arch="x64"
    # - npm run make -- --platform="linux" --arch="arm64"
  when: manual

deploy:
  stage: buildAndDeployElectron
  # before_script:
  #   - cd receivers/electron
  script:
    - sh deploy.sh
  when: manual