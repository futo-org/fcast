
buildDockerContainer:
  tags:
    - fcast
  before_script:
    - cd receivers/electron
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t gitlab.futo.org:5050/videostreaming/fcast/receiver-electron-dev .
    - docker push gitlab.futo.org:5050/videostreaming/fcast/receiver-electron-dev
  when: manual

buildMac:
  stage: buildAndDeployElectron
  tags:
    - m1-macos
  before_script:
    - cd receivers/electron
  script:
    - npm install
    - npm run build
    - npm run make -- --platform="darwin" --arch="arm64"
    - npm run make -- --platform="darwin" --arch="x64"
  artifacts:
    untracked: false
    when: on_success
    access: all
    expire_in: "30 days"
    paths:
      - out/make/*
  when: manual

buildWindowsAndLinux:
  image: gitlab.futo.org:5050/videostreaming/fcast/receiver-electron-dev
  stage: buildAndDeployElectron
  tags:
    - fcast
  before_script:
    - cd receivers/electron
  script:
    - npm install
    - npm run build
    - npm run make -- --platform="win32" --arch="x64"
    - npm run make -- --platform="linux" --arch="x64"
    - npm run make -- --platform="linux" --arch="arm64"
    # todo: upload artifacts to s3 if release or rc
  artifacts:
    untracked: false
    when: on_success
    access: all
    expire_in: "30 days"
    paths:
      - out/make/*
    exclude:
      - out/make/wix/x64/*.w*
  when: manual

deploy:
  stage: buildAndDeployElectron
  before_script:
    - cd receivers/electron
  script:
    - python scripts/deploy.py
  when: manual
