
buildMacOs:
  stage: buildAndDeployElectron
  tags:
    - m1-macos
  before_script:
    - cd receivers/electron
  script:
    - npm install
    - npm run build
    - npm run package -- --arch="arm64"
    - npm run make -- --arch="arm64"
  when: manual

deploy:
  stage: buildAndDeployElectron
  # before_script:
  #   - cd receivers/electron
  script:
    - sh deploy.sh
  when: manual