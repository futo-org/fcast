name: fcast_sender_sdk
description: "An SDK for easily creating senders for FCast and Google cast"
version: 0.0.4
repository: https://gitlab.futo.org/videostreaming/fcast-sender-sdk-flutter-plugin

environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.13.0-beta.5
  plugin_platform_interface: ^2.0.2
  freezed_annotation: ^3.1.0
  bonsoir: ^7.1.4
  flutter_rust_bridge_hooks: 2.13.0-beta.5

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.2.0
  build_runner: ^2.7.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
